<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Nuestra Historia ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0b0b0b;
    color:white;
    overflow-x:hidden;
}

/* 🎬 INTRO */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:99999;
    animation:fadeOut 3s ease forwards;
    animation-delay:2.5s;
}

.loader{
    width:60px;
    height:60px;
    border:4px solid #333;
    border-top:4px solid #ff4d6d;
    border-radius:50%;
    margin-top:20px;
    animation:spin 1s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}

/* 🔐 LOCK SCREEN */
#lock{
    position:fixed;
    width:100%;
    height:100%;
    background:#0b0b0b;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#lock input{
    padding:10px;
    border:none;
    border-radius:10px;
    margin-top:10px;
}

/* BOTÓN */
.btn{
    margin-top:15px;
    padding:14px 25px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    background:white;
    color:black;
    font-size:1rem;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),url('foto1.jpg');
    background-size:cover;
    background-position:center;
}

.hero h1{
    font-family:'Great Vibes',cursive;
    font-size:4rem;
    text-shadow:0 0 25px #ff4d6d;
    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px #ff4d6d;}
    to{ text-shadow:0 0 30px #ff4d6d;}
}

/* CAPÍTULOS */
.chapter{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
    opacity:0;
    transform:translateY(40px) scale(0.98);
    filter:blur(10px);
    transition:1s ease;
}

.chapter.active{
    opacity:1;
    transform:translateY(0) scale(1);
    filter:blur(0);
}

.chapter img{
    width:280px;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0 0 25px rgba(255,77,109,0.4);
}

/* CARTA */
.card{
    width:280px;
    height:180px;
    perspective:1000px;
    cursor:pointer;
}

.card-inner{
    width:100%;
    height:100%;
    transition:1s;
    transform-style:preserve-3d;
    position:relative;
}

.card.open .card-inner{
    transform:rotateY(180deg);
}

.card-front,.card-back{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:15px;
}

.card-front{background:#222;}
.card-back{background:#ff4d6d;transform:rotateY(180deg);}

/* CORAZONES */
.heart{
    position:fixed;
    color:#ff4d6d;
    animation:float 7s linear;
}

@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-100px);}
}

/* 📱 MOBILE PRO MAX */
@media (max-width: 768px){

.hero h1{
    font-size:2.2rem;
    padding:0 10px;
}

.chapter{
    padding:20px;
}

.chapter h1{
    font-size:1.6rem;
}

.chapter img{
    width:90%;
    max-width:320px;
}

.btn{
    width:85%;
    max-width:300px;
}

.card{
    width:90%;
    max-width:300px;
}

#lock input{
    width:80%;
}

}

@media (max-width: 400px){

.hero h1{
    font-size:1.8rem;
}

.chapter h1{
    font-size:1.4rem;
}

}

</style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
    <h1>❤️ Preparando nuestra historia...</h1>
    <div class="loader"></div>
</div>

<!-- 🔐 LOCK -->
<div id="lock">
    <h2>🔒 Clave de amor</h2>
    <input type="password" id="pass">
    <button class="btn" onclick="check()">Entrar ❤️</button>
</div>

<!-- 🎵 MÚSICA -->
<audio id="music" loop>
    <source src="voy-a-conquistar-tu-amor.mp3">
</audio>

<!-- HERO -->
<section class="hero">

    <h1>Nuestra Historia ❤️</h1>

    <button class="btn" onclick="start()">
        💖 Entrar a la historia
    </button>

</section>

<!-- CAPÍTULOS -->
<section class="chapter">
    <h1>Capítulo 1 💕</h1>
    <img src="foto1.jpg">
</section>

<section class="chapter">
    <h1>Capítulo 2 💖</h1>
    <img src="foto2.jpg">
</section>

<section class="chapter">
    <h1>Capítulo 3 ❤️</h1>
    <img src="foto3.jpg">
</section>

<section class="chapter">
    <h1>Capítulo 4 💞</h1>
    <img src="foto4.jpg">
</section>

<section class="chapter">
    <h1>Capítulo 5 💘</h1>
    <img src="foto5.jpg">
</section>

<section class="chapter">
    <h1>Capítulo 6 💝</h1>
    <img src="foto6.jpg">
</section>

<!-- 💌 CARTA -->
<section class="chapter">
    <h1>💌 Carta final</h1>

    <div class="card" onclick="this.classList.toggle('open')">
        <div class="card-inner">
            <div class="card-front">Toca 💌</div>
            <div class="card-back">
                <p>Te amo mucho ❤️</p>
            </div>
        </div>
    </div>
</section>

<script>

/* 🔐 PASSWORD */
function check(){
    if(document.getElementById("pass").value==="bellaqueo19"){
        document.getElementById("lock").style.display="none";
    }else{
        alert("Clave incorrecta ❤️");
    }
}

/* 🎬 START */
function start(){
    document.getElementById("music").play();
    document.documentElement.requestFullscreen();
    document.getElementById("intro").style.display="none";
}

/* 🎬 SCROLL */
const chapters=document.querySelectorAll(".chapter");

window.addEventListener("scroll",()=>{
    chapters.forEach(c=>{
        if(c.getBoundingClientRect().top<window.innerHeight-100){
            c.classList.add("active");
        }
    });
});

/* 💖 HEARTS */
setInterval(()=>{
    const h=document.createElement("div");
    h.innerHTML="❤️";
    h.classList.add("heart");
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),7000);
},400);

</script>

</body>
</html>
