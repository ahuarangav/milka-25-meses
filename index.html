<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Modo Dios - Nuestra Historia ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Poppins,sans-serif;
    background:#0b0b0b;
    color:white;
    overflow-x:hidden;
}

/* 🎬 INTRO GOD */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:99999;
    animation:fadeOut 3s ease forwards;
    animation-delay:2.5s;
}

.loader{
    width:70px;height:70px;
    border:4px solid #333;
    border-top:4px solid #ff4d6d;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-top:20px;
}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}

/* 🔐 LOCK */
#lock{
    position:fixed;
    width:100%;
    height:100%;
    background:#0b0b0b;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

input{
    padding:10px;
    border:none;
    border-radius:10px;
    margin-top:10px;
}

.btn{
    margin-top:15px;
    padding:12px 25px;
    border-radius:50px;
    border:none;
    cursor:pointer;
    background:white;
}

/* 🎬 HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),url('foto1.jpg');
    background-size:cover;
}

.hero h1{
    font-family:Great Vibes;
    font-size:4rem;
    text-shadow:0 0 25px #ff4d6d;
}

/* 📽️ CAPÍTULOS GOD */
.chapter{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    opacity:0;
    transform:scale(0.95);
    filter:blur(10px);
    transition:1.2s ease;
    position:relative;
}

.chapter.active{
    opacity:1;
    transform:scale(1);
    filter:blur(0);
}

/* progreso visual tipo Netflix */
.progress{
    position:fixed;
    top:0;
    left:0;
    height:4px;
    background:#ff4d6d;
    width:0%;
    z-index:9999;
}

/* 💖 CARTA GOD */
.card{
    width:280px;
    height:180px;
    perspective:1000px;
    cursor:pointer;
}

.card-inner{
    width:100%;
    height:100%;
    transition:1s;
    transform-style:preserve-3d;
}

.card.open .card-inner{
    transform:rotateY(180deg);
}

.card-front,.card-back{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:15px;
}

.card-back{
    transform:rotateY(180deg);
    background:#ff4d6d;
}

.card-front{
    background:#222;
}

/* 💖 CORAZONES */
.heart{
    position:fixed;
    color:#ff4d6d;
    animation:float 7s linear;
}

@keyframes float{
    from{transform:translateY(100vh)}
    to{transform:translateY(-100px)}
}

/* mensaje secreto */
.secret{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#ff4d6d;
    padding:10px 20px;
    border-radius:20px;
    opacity:0;
    transition:.5s;
}

.secret.show{opacity:1}

</style>
</head>

<body>

<div id="intro">
    <h1>❤️ Cargando historia...</h1>
    <div class="loader"></div>
</div>

<div id="lock">
    <h2>🔒 Clave de amor</h2>
    <input type="password" id="pass">
    <button class="btn" onclick="unlock()">Entrar</button>
</div>

<div class="progress" id="progress"></div>

<audio id="music" loop>
    <source src="voy-a-conquistar-tu-amor.mp3">
</audio>

<section class="hero">
    <h1>Nuestra Historia ❤️</h1>
    <button class="btn" onclick="start()">💖 Iniciar historia</button>
</section>

<section class="chapter"><h1>Capítulo 1</h1><img src="foto1.jpg"></section>
<section class="chapter"><h1>Capítulo 2</h1><img src="foto2.jpg"></section>
<section class="chapter"><h1>Capítulo 3</h1><img src="foto3.jpg"></section>
<section class="chapter"><h1>Capítulo 4</h1><img src="foto4.jpg"></section>
<section class="chapter"><h1>Capítulo 5</h1><img src="foto5.jpg"></section>
<section class="chapter"><h1>Capítulo 6</h1><img src="foto6.jpg"></section>

<section class="chapter">
    <h1>💌 Carta final</h1>

    <div class="card" onclick="this.classList.toggle('open')">
        <div class="card-inner">
            <div class="card-front">Abrir 💌</div>
            <div class="card-back">Te amo para siempre ❤️</div>
        </div>
    </div>
</section>

<div class="secret" id="secret">💖 Te amo más de lo que imaginas</div>

<script>

function unlock(){
    if(document.getElementById("pass").value==="bellaqueo19"){
        document.getElementById("lock").style.display="none";
    }else alert("Clave incorrecta ❤️");
}

function start(){
    document.getElementById("music").play();
    document.documentElement.requestFullscreen();
    document.getElementById("intro").style.display="none";
}

/* scroll cinematic + progreso */
const chapters=document.querySelectorAll(".chapter");
const progress=document.getElementById("progress");

window.addEventListener("scroll",()=>{

    let scrolled=(window.scrollY/(document.body.scrollHeight-window.innerHeight))*100;
    progress.style.width=scrolled+"%";

    chapters.forEach((c,i)=>{
        if(c.getBoundingClientRect().top<window.innerHeight-100){
            c.classList.add("active");

            if(i===2){
                document.getElementById("secret").classList.add("show");
            }
        }
    });

});

/* corazones */
setInterval(()=>{
    const h=document.createElement("div");
    h.innerHTML="❤️";
    h.className="heart";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),7000);
},350);

</script>

</body>
</html>
